# Render.com 배포 설정

services:
  - type: web
    name: pneumonia-api
    env: python
    region: oregon
    plan: free
    runtime: python

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    # gevent → gthread 로 교체
    # 원인: gevent의 monkey-patching이 PyTorch와 충돌하여
    #   OPTIONS preflight 요청이 gevent에서 소켓을 변조하는 과정에서
    #   플라스크에 도달하기 전에 연결이 끼집니다.
    #   Render 로그에도 OPTIONS 요청이 단 한 줄도 찍히지 않음 = Flask 자체에 도달 안 함.
    #   또한 Render 로그의 FutureWarning(torch.distributed.reduce_op) 이
    #   gevent가 PyTorch 스레드 타입을 승인하는 과정에서 발생하는 충돌의 증거.
    #
    # gthread: 실제 OS 스레드 사용, monkey-patching 없음, PyTorch와 안정적으로 동작
    startCommand: |
      export PYTHONPATH=. && \
      gunicorn --bind 0.0.0.0:$PORT \
               --workers 1 \
               --worker-class gthread \
               --threads 4 \
               --worker-tmp-dir /dev/shm \
               --timeout 180 \
               --graceful-timeout 60 \
               --max-requests 1000 \
               --max-requests-jitter 50 \
               --access-logfile - \
               --error-logfile - \
               --log-level info \
               app:app

    healthCheckPath: /health/ready
    autoDeploy: false
    branch: main

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHONPATH
        value: .
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONTENT_LENGTH
        value: 10485760
      - key: RENDER
        value: true
      - key: MODEL_PATH
        value: backend/models/model.onnx
      - key: LABELS_PATH
        value: backend/models/labels.txt
      - key: OMP_NUM_THREADS
        value: 2
      - key: OMP_WAIT_POLICY
        value: PASSIVE
      - key: KMP_AFFINITY
        value: disabled
      - key: ORT_DISABLE_MEMORY_ARENA
        value: 1
      - key: ORT_EXECUTION_MODE
        value: sequential
