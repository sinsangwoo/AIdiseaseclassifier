# Render.com 배포 설정
#
# ⚠️  Render 대시보드가 render.yaml을 무시하는 경우:
#     대시보드 → Settings → Auto-Deploy 를 반드시 OFF 로 변경하세요.
#     프론트엔드(CSS/JS) 수정은 Render 대시보드에 영향없음.
#     백엔드(backend/) 수정 시만 Render 대시보드에서 수동 리디플로이하세요.

services:
  - type: web
    name: pneumonia-api
    env: python
    region: oregon
    plan: free
    runtime: python

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    startCommand: |
      export PYTHONPATH=. && \
      gunicorn --bind 0.0.0.0:$PORT \
               --workers 1 \
               --worker-class gevent \
               --worker-tmp-dir /dev/shm \
               --timeout 180 \
               --graceful-timeout 60 \
               --max-requests 1000 \
               --max-requests-jitter 50 \
               --access-logfile - \
               --error-logfile - \
               --log-level info \
               backend.app:app

    healthCheckPath: /health/ready
    autoDeploy: false
    branch: main

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: backend.app
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHONPATH
        value: .
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONTENT_LENGTH
        value: 10485760
      - key: RENDER
        value: true
      - key: MODEL_PATH
        value: backend/models/model.onnx
      - key: LABELS_PATH
        value: backend/models/labels.txt
      - key: OMP_NUM_THREADS
        value: 2
      - key: OMP_WAIT_POLICY
        value: PASSIVE
      - key: KMP_AFFINITY
        value: disabled
      - key: ORT_DISABLE_MEMORY_ARENA
        value: 1
      - key: ORT_EXECUTION_MODE
        value: sequential
