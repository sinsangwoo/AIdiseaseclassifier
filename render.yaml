# Render.com 배포 설정
# https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: pneumonia-api
    env: python
    region: oregon
    plan: free
    runtime: python

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    # --preload 제거: 환경변수 주입 전 create_app() 실행 방지
    # --preload 가 있으면 gunicorn 마스터 프로세스에서 앱을 먼저 로드한 뒤
    # 환경변수를 워커에 전달하므로, FLASK_ENV 등이 누락될 수 있습니다.
    startCommand: |
      export PYTHONPATH=. && \
      gunicorn --bind 0.0.0.0:$PORT \
               --workers 1 \
               --worker-class gevent \
               --worker-tmp-dir /dev/shm \
               --timeout 180 \
               --max-requests 1000 \
               --max-requests-jitter 50 \
               --access-logfile - \
               --error-logfile - \
               --log-level info \
               backend.app:app

    healthCheckPath: /health/ready

    envVars:
      - key: FLASK_ENV
        value: production

      - key: FLASK_APP
        value: backend.app

      - key: PYTHONUNBUFFERED
        value: 1

      - key: PYTHONPATH
        value: .

      - key: SECRET_KEY
        generateValue: true

      # CORS: 명시적으로 * 설정 (GitHub Pages 도메인 변경에도 대응)
      - key: CORS_ORIGINS
        value: "*"

      - key: LOG_LEVEL
        value: INFO

      - key: MAX_CONTENT_LENGTH
        value: 10485760

      - key: RENDER
        value: true

      - key: MODEL_PATH
        value: backend/models/model.onnx

      - key: LABELS_PATH
        value: backend/models/labels.txt

      - key: OMP_NUM_THREADS
        value: 2

      - key: OMP_WAIT_POLICY
        value: PASSIVE

      - key: KMP_AFFINITY
        value: disabled

      - key: ORT_DISABLE_MEMORY_ARENA
        value: 1

      - key: ORT_EXECUTION_MODE
        value: sequential

    autoDeploy: true
    branch: main
