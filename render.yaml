# Render.com 배포 설정
#
# 주의: Render 대시보드가 render.yaml을 무시하고 대시보드
#        Start Command을 직접 관리하는 경우 여기 값이 적용안 될 수 있습니다.
#        그 경우 대시보드에서 직접 autoDeploy 를 비활성화하는 것을 권장합니다.

services:
  - type: web
    name: pneumonia-api
    env: python
    region: oregon
    plan: free
    runtime: python

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    # --preload 제거: 환경변수 주입 전 create_app() 실행 방지
    startCommand: |
      export PYTHONPATH=. && \
      gunicorn --bind 0.0.0.0:$PORT \
               --workers 1 \
               --worker-class gevent \
               --worker-tmp-dir /dev/shm \
               --timeout 180 \
               --max-requests 1000 \
               --max-requests-jitter 50 \
               --access-logfile - \
               --error-logfile - \
               --log-level info \
               backend.app:app

    healthCheckPath: /health/ready

    # autoDeploy: false 를 권장하는 이유:
    #   main 브랜치에 프론트엔드 CSS/JS 파일만 변경해도
    #   Render가 서버를 재시작하여 90초 CORS 에러가 발생합니다.
    #   프론트엔드만 변경 시는 Render 수동 배포를 해주세요.
    autoDeploy: true
    branch: main

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: backend.app
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHONPATH
        value: .
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONTENT_LENGTH
        value: 10485760
      - key: RENDER
        value: true
      - key: MODEL_PATH
        value: backend/models/model.onnx
      - key: LABELS_PATH
        value: backend/models/labels.txt
      - key: OMP_NUM_THREADS
        value: 2
      - key: OMP_WAIT_POLICY
        value: PASSIVE
      - key: KMP_AFFINITY
        value: disabled
      - key: ORT_DISABLE_MEMORY_ARENA
        value: 1
      - key: ORT_EXECUTION_MODE
        value: sequential
