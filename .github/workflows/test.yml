name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-timeout

    - name: Verify model files
      run: |
        for f in backend/models/keras_model.h5 backend/models/model.onnx backend/models/labels.txt; do
          [ -f "$f" ] && echo "v $f  ($(du -sh $f | cut -f1))" || { echo "x $f NOT FOUND"; exit 1; }
        done
        echo "labels.txt:"; cat backend/models/labels.txt

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

    # ── 1: 단위 테스트 ───────────────────────────────────────────────────
    - name: Run unit tests
      id: unit
      run: |
        pytest tests/ -v -m "unit" --tb=long --timeout=30 --no-header -rN \
          2>&1 | tee unit_out.txt
        echo "EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
      continue-on-error: true

    - name: Unit test summary
      if: always()
      run: |
        echo "## Unit Tests (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -40 unit_out.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no output)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep -q "FAILED" unit_out.txt 2>/dev/null && {
          echo "### FAILED" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "FAILED\|AssertionError\|Error" unit_out.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        } || true

    - name: Fail if unit tests failed
      if: env.EXIT != '0'
      run: exit 1

    # ── 2: 프론트엔드 JS 상태 머신 계약 테스트 ────────────────────────
    - name: Run frontend contract tests
      id: frontend
      run: |
        pytest tests/test_frontend_state.py -v -m "frontend" --tb=long --timeout=30 --no-header -rN \
          2>&1 | tee frontend_out.txt
        echo "FE_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
      continue-on-error: true

    - name: Frontend test summary
      if: always()
      run: |
        echo "## Frontend Contract Tests (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat frontend_out.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no output)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep -q "FAILED" frontend_out.txt 2>/dev/null && {
          echo "### FAILED - JS 코드 수정 시 상태 머신 계약 위반" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "FAILED\|AssertionError\|assert" frontend_out.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        } || true

    - name: Fail if frontend tests failed
      if: env.FE_EXIT != '0'
      run: exit 1

    # ── 3: API 테스트 ─────────────────────────────────────────────────────
    - name: Run API tests
      id: api
      run: |
        pytest tests/ -v -m "api" --tb=long --timeout=60 --no-header -rN \
          2>&1 | tee api_out.txt
        echo "API_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
      continue-on-error: true

    - name: API test summary
      if: always()
      run: |
        echo "## API Tests (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -60 api_out.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no output)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep -q "FAILED" api_out.txt 2>/dev/null && {
          echo "### FAILED" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "FAILED\|AssertionError\|Error" api_out.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        } || true

    - name: Fail if API tests failed
      if: env.API_EXIT != '0'
      run: exit 1

    # ── 4: 전체 + 커버리지 ───────────────────────────────────────────────
    - name: Run all tests with coverage
      id: coverage
      run: |
        pytest tests/ -v \
          --cov=backend \
          --cov-report=xml --cov-report=term-missing --cov-report=html \
          --tb=long --timeout=120 --no-header -rN \
          2>&1 | tee cov_out.txt
        echo "COV_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
      continue-on-error: true

    - name: Coverage summary
      if: always()
      run: |
        echo "## Coverage (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep "TOTAL\|FAILED\|passed\|failed\|error" cov_out.txt | tail -20 >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep -q "FAILED" cov_out.txt 2>/dev/null && {
          echo "### FAILED 상세" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 15 "FAILURES" cov_out.txt | head -60 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        } || true

    - name: Fail if coverage tests failed
      if: env.COV_EXIT != '0'
      run: exit 1

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      if: matrix.python-version == '3.11'

    - name: Archive all test outputs
      uses: actions/upload-artifact@v4
      with:
        name: test-results-py${{ matrix.python-version }}
        path: |
          htmlcov/
          unit_out.txt
          frontend_out.txt
          api_out.txt
          cov_out.txt
          coverage.xml
      if: always()

  # ── Lint ───────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.11', cache: 'pip' }
    - run: pip install flake8 black isort
    - name: black (non-blocking)
      run: black --check backend/ tests/ && echo "v black OK" || echo "! black 이슈 (non-blocking)"
      continue-on-error: true
    - name: isort (non-blocking)
      run: isort --check-only backend/ tests/ && echo "v isort OK" || echo "! isort 이슈 (non-blocking)"
      continue-on-error: true
    - name: flake8 syntax errors (blocking)
      run: flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: flake8 style (non-blocking)
      run: flake8 backend/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
