name: Deploy Backend to Render

# 백엔드 파일 변경 시에만 Render 리디플로이 트리거
# 프론트엔드(CSS/JS/HTML) 수정은 Render에 영향없음
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'app.py'
      - 'requirements.txt'
      - 'render.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Render 서비스 리디플로이 트리거
        run: |
          echo "백엔드 파일 변경 감지 - Render 리디플로이 시작"

          # Render Deploy Hook URL이 설정된 경우만 실행
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_URL secret이 설정되지 않았습니다."
            echo ""
            echo "설정 방법:"
            echo "  1. Render 대시보드 → Settings → Deploy Hook 복사"
            echo "  2. GitHub 저장소 → Settings → Secrets → RENDER_DEPLOY_HOOK_URL 추가"
            echo ""
            echo "현재 Render 대시보드에서 수동 리디플로이하세요."
            exit 0
          fi

          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          echo "Render 응답 코드: $HTTP_STATUS"
          cat /tmp/render_response.txt

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Render 리디플로이 실패 (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Render 리디플로이 요청 성공"
